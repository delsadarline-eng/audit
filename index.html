<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Runner | Passed Pawn Premier Strategies</title>
<style>
:root {
  --black:#0D0D0D; --brown:#3D1A14; --gold:#C9A84C;
  --gold-light:#E2C97E; --gold-dark:#8B6914;
  --cream:#EDE5CE; --cream-light:#F7F2E7; --cream-mid:#F0E8D5;
  --white:#FFFFFF; --gray:#666; --text:#1A1A1A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--cream-light);font-family:Arial,sans-serif;font-size:13px;color:var(--text);}
.layout{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh;overflow:hidden;}
.header{background:var(--brown);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);flex-shrink:0;}
.brand-name{font-size:17px;color:var(--white);font-weight:700;}
.brand-top{font-size:9px;color:var(--gold);margin-bottom:2px;}
.controls{display:flex;align-items:center;gap:12px;}
#lastCheck{font-size:9px;color:var(--gold-light);display:none;}
#statusText{font-size:10px;color:var(--gray);}
#toggleBtn{padding:9px 20px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:var(--gold);color:var(--black);}
.stats{background:var(--black);display:flex;flex-shrink:0;border-bottom:1px solid var(--gold-dark);}
.stat{flex:1;padding:8px 0;text-align:center;border-right:1px solid var(--gold-dark);}
.stat-num{font-size:22px;font-weight:900;line-height:1;}
.stat-lbl{font-size:7px;color:var(--gray);text-transform:uppercase;margin-top:2px;}
.main{display:flex;overflow:hidden;min-height:0;}
.list{flex:1;overflow-y:auto;border-right:2px solid var(--gold-dark);}
.empty-msg{padding:32px;text-align:center;color:var(--gray);}
.card{padding:12px 16px;border-bottom:1px solid var(--cream-mid);}
.card.pending{background:var(--white);}
.card.running{background:#eff6ff;}
.card.done{background:#f0fdf4;}
.card.error{background:#fef2f2;}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;}
.card-name{font-size:14px;font-weight:700;color:var(--text);}
.card-co{font-size:11px;color:var(--gold-dark);font-style:italic;margin-top:2px;}
.card-em{font-size:9px;color:var(--gray);margin-top:2px;}
.badge{font-size:9px;font-weight:700;padding:3px 8px;margin-left:8px;flex-shrink:0;}
.badge.pending{background:#fef9c3;color:#854d0e;border:1px solid #fde047;}
.badge.running{background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd;}
.badge.done{background:#dcfce7;color:#166534;border:1px solid #86efac;}
.badge.error{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;}
.card-ok{margin-top:8px;padding:6px 10px;background:#dcfce7;border-left:3px solid #86efac;font-size:10px;color:#166534;}
.btn-retry{margin-top:6px;padding:5px 12px;background:var(--black);color:var(--gold);border:1px solid var(--gold);font-size:9px;font-weight:700;cursor:pointer;}
.log-panel{width:260px;background:var(--black);display:flex;flex-direction:column;flex-shrink:0;}
.log-hdr{padding:8px 12px;background:var(--brown);border-bottom:1px solid var(--gold-dark);font-size:7px;color:var(--gold);font-weight:700;text-transform:uppercase;}
.log-body{flex:1;overflow-y:auto;}
.log-entry{padding:5px 12px;font-size:9px;line-height:1.5;border-bottom:1px solid #1a1a1a;color:var(--gray);}
.log-latest{color:var(--gold-light) !important;background:#1a1200;}
.footer{background:var(--black);padding:7px 16px;display:flex;justify-content:space-between;border-top:2px solid var(--gold);}
.footer span{font-size:8px;color:var(--gold-dark);}
.err-bar{background:#fef2f2;border-bottom:1px solid #fca5a5;padding:10px 16px;font-size:11px;color:#991b1b;display:none;}
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div>
      <div class="brand-top">Passed Pawn Premier Strategies</div>
      <div class="brand-name">Audit Runner</div>
    </div>
    <div class="controls">
      <span id="lastCheck"></span>
      <span id="statusText">Paused</span>
      <button id="toggleBtn">Start</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal" style="color:var(--gold)">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-num" id="sPending" style="color:#fde047">0</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-num" id="sActive" style="color:#60a5fa">0</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-num" id="sSent" style="color:#4ade80">0</div><div class="stat-lbl">Sent</div></div>
    <div class="stat"><div class="stat-num" id="sErrors" style="color:#f87171">0</div><div class="stat-lbl">Errors</div></div>
  </div>

  <div class="main">
    <div class="list" id="list">
      <div class="err-bar" id="errBar">Cannot reach Google Sheet. Check deployment.</div>
      <div class="empty-msg" id="emptyMsg">Press Start to begin monitoring</div>
    </div>
    <div class="log-panel">
      <div class="log-hdr">Activity Log</div>
      <div class="log-body" id="logBody"><div class="log-entry">Waiting to start...</div></div>
    </div>
  </div>

  <div class="footer">
    <span>passedpawnpremier.com</span>
    <span id="footerStatus">Paused</span>
    <span>No Fluff. Tough Love. Real Results.</span>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuxnMzDtAJqNZ8sde7AB9go3_fklljE94l8SGhKKXtfKvuWgL7ClZHy99Lp57WfNt5/exec';

var running   = false;
var pollTimer = null;
var attendees = [];
var statuses  = {};
var processed = {};
var logs      = [];

document.getElementById('toggleBtn').addEventListener('click', function() {
  running = !running;
  var btn  = document.getElementById('toggleBtn');
  var txt  = document.getElementById('statusText');
  var foot = document.getElementById('footerStatus');
  if (running) {
    btn.textContent = 'Pause';
    btn.style.background = '#991b1b';
    btn.style.color = '#fff';
    txt.textContent = 'Live';
    txt.style.color = '#4ade80';
    foot.textContent = 'Live - checking every 30s';
    addLog('Started - watching for sign-ins');
    cycle();
    pollTimer = setInterval(cycle, 30000);
  } else {
    btn.textContent = 'Start';
    btn.style.background = 'var(--gold)';
    btn.style.color = 'var(--black)';
    txt.textContent = 'Paused';
    txt.style.color = 'var(--gray)';
    foot.textContent = 'Paused';
    clearInterval(pollTimer);
    addLog('Paused');
  }
});

function addLog(msg) {
  var t = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  logs.unshift('[' + t + '] ' + msg);
  if (logs.length > 100) logs.pop();
  var body = document.getElementById('logBody');
  body.innerHTML = logs.map(function(e, i) {
    return '<div class="log-entry' + (i === 0 ? ' log-latest' : '') + '">' + e + '</div>';
  }).join('');
}

function cycle() {
  if (!running) return;
  fetch(SCRIPT_URL + '?t=' + Date.now())
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      attendees = data.attendees || [];
      document.getElementById('errBar').style.display = 'none';
      var now = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      var lc = document.getElementById('lastCheck');
      lc.textContent = 'Last: ' + now;
      lc.style.display = 'inline';

      attendees.forEach(function(a) {
        if (a.audited === 'done' && statuses[a.id] !== 'done') {
          statuses[a.id] = 'done';
          addLog('Confirmed sent: ' + a.name);
        }
      });

      updateStats();
      renderList();

      var unprocessed = attendees.filter(function(a) {
        return !processed[a.id] && a.audited !== 'done';
      });

      if (unprocessed.length > 0) {
        addLog('Found ' + unprocessed.length + ' new attendee(s)');
        processNext(unprocessed, 0);
      }
    })
    .catch(function(err) {
      document.getElementById('errBar').style.display = 'block';
      addLog('Sheet fetch failed: ' + err.message);
    });
}

function processNext(list, index) {
  if (!running) return;
  if (index >= list.length) return;
  var a = list[index];
  processed[a.id] = true;
  statuses[a.id] = 'running';
  updateStats();
  renderList();
  addLog('Processing: ' + a.name + ' - ' + a.company);

  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'audit', attendee: a})
  })
  .then(function() {
    statuses[a.id] = 'done';
    addLog('Triggered OK: ' + a.name + ' - audit and email running on Google servers');
    updateStats();
    renderList();
    setTimeout(function() { processNext(list, index + 1); }, 1500);
  })
  .catch(function(err) {
    statuses[a.id] = 'error';
    addLog('Failed: ' + a.name + ' - ' + err.message);
    updateStats();
    renderList();
    setTimeout(function() { processNext(list, index + 1); }, 1500);
  });
}

function updateStats() {
  var vals = Object.values(statuses);
  document.getElementById('sTotal').textContent   = attendees.length;
  document.getElementById('sPending').textContent  = vals.filter(function(s){return s==='pending';}).length;
  document.getElementById('sActive').textContent   = vals.filter(function(s){return s==='running';}).length;
  document.getElementById('sSent').textContent     = vals.filter(function(s){return s==='done';}).length;
  document.getElementById('sErrors').textContent   = vals.filter(function(s){return s==='error';}).length;
}

function renderList() {
  var container = document.getElementById('list');
  var errBar    = document.getElementById('errBar');
  var emptyMsg  = document.getElementById('emptyMsg');

  container.innerHTML = '';
  container.appendChild(errBar);

  if (attendees.length === 0) {
    emptyMsg.textContent = running ? 'Watching for sign-ins...' : 'Press Start to begin monitoring';
    container.appendChild(emptyMsg);
    return;
  }

  attendees.forEach(function(a, i) {
    var s = statuses[a.id] || (a.audited === 'done' ? 'done' : 'pending');
    var labels = {pending:'Pending', running:'Processing', done:'Sent', error:'Error'};
    var div = document.createElement('div');
    div.className = 'card ' + s;
    var website = a.website ? a.website.replace(/^https?:\/\/(www\.)?/, '') : '';
    div.innerHTML =
      '<div class="card-row">' +
        '<div>' +
          '<div class="card-name">' + esc(a.name) + '</div>' +
          '<div class="card-co">' + esc(a.company) + '</div>' +
          '<div class="card-em">' + esc(a.email) + (website ? ' - ' + esc(website) : '') + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:10px;">' +
          '<span class="badge ' + s + '">' + (labels[s] || 'Pending') + '</span>' +
          '<span style="font-size:9px;color:var(--gray)">#' + (i+1) + ' - ' + esc(a.checked_in || '') + '</span>' +
        '</div>' +
      '</div>' +
      (s === 'done' ? '<div class="card-ok">Audit complete - email delivered to ' + esc(a.email) + '</div>' : '') +
      (s === 'error' ? '<button class="btn-retry" data-id="' + a.id + '">Retry</button>' : '');
    container.appendChild(div);
  });

  container.querySelectorAll('.btn-retry').forEach(function(btn) {
    btn.addEventListener('click', function() {
      retry(this.getAttribute('data-id'));
    });
  });
}

function retry(id) {
  var a = attendees.find(function(x) { return String(x.id) === String(id); });
  if (!a) return;
  delete processed[id];
  statuses[id] = 'running';
  addLog('Retrying: ' + a.name);
  updateStats();
  renderList();
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: 'audit', attendee: a})
  })
  .then(function() {
    statuses[id] = 'done';
    addLog('Retry sent: ' + a.name);
    updateStats();
    renderList();
  })
  .catch(function(err) {
    statuses[id] = 'error';
    addLog('Retry failed: ' + a.name + ' - ' + err.message);
    updateStats();
    renderList();
  });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
